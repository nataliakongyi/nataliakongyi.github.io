<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- redirect interno, no externo -->
  <meta http-equiv="refresh" content="0; url=/en/product/index" />

  <!-- fallback -->
  <script>
    window.location.replace("/en/product/index");
  </script>

  <meta name="robots" content="noindex, follow" />

  <title>Redirecting…</title>
</head>

<body>
  <p>
    If you are not redirected automatically,
    <a href="/en/product/index">click here</a>.
  </p>
</body>
</html>
